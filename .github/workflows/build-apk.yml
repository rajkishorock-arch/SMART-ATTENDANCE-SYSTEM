name: Build and Release Android APK

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.3)'
        required: true
        type: string
      # callback_url:
      #   description: 'URL to notify when the build is finished'
      #   required: true
      #   type: string
      # callback_token:
      #   description: 'Secure token for callback authorization'
      #   required: true
      #   type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Update Application Version Name and Code
        run: |
          cd frontend
          python update_version.py ${{ github.event.inputs.version }}

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Web Bundle
        run: |
          cd frontend
          npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Synchronize Capacitor to Android
        run: |
          cd frontend
          npx cap sync android

      - name: Decode Release Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/release.keystore

      - name: Build Signed Release APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release and Upload APK
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk_path="frontend/android/app/build/outputs/apk/release/app-release.apk"
          version_tag="v${{ github.event.inputs.version }}"
          
          echo "Creating Release $version_tag"
          gh release create "$version_tag" "$apk_path" \
            --title "Release $version_tag" \
            --notes "Automated build of version $version_tag."
            
          download_url="https://github.com/${{ github.repository }}/releases/download/${version_tag}/app-release.apk"
          echo "download_url=$download_url" >> $GITHUB_ENV

      # - name: Send Success Callback to Backend
      #   if: success()
      #   run: |
      #     curl -X POST "${{ github.event.inputs.callback_url }}" \
      #       -H "Content-Type: application/json" \
      #       -d '{
      #         "status": "success",
      #         "version": "${{ github.event.inputs.version }}",
      #         "download_url": "${{ env.download_url }}",
      #         "token": "${{ github.event.inputs.callback_token }}"
      #       }'

